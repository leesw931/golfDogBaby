<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>골프 토글</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #f5f6fa;
      padding: 24px;
    }

    h1 {
      font-size: 32px;
      margin: 20px 0 30px;
      text-align: center;
    }

    .box {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 28px;
      border-radius: 24px;
      background: white;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.1);
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 26px 0;
      font-size: 28px;
      font-weight: 700;
      border-bottom: 1px solid #e5e7eb;
    }

    .row:last-child {
      border-bottom: none;
    }

    .toggle {
      width: 96px;
      height: 54px;
      border: none;
      border-radius: 999px;
      padding: 5px;
      cursor: pointer;
      background: #cfd4dc;
      transition: background 0.2s;
    }

    .toggle span {
      display: block;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: white;
      transition: transform 0.2s;
    }

    .toggle.on {
      background: #2f80ed;
    }

    .toggle.on span {
      transform: translateX(42px);
    }

    .result {
      max-width: 480px;
      margin: 28px auto 0;
      padding: 20px;
      border-radius: 18px;
      background: #ffffff;
      font-size: 20px;
      line-height: 1.8;
      text-align: center;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    }
  </style>
</head>

<body>
  <h1>골프개새끼 - 잘하고 싶은걸 모두 ON시켜보세요</h1>

  <div class="box">
    <div class="row">
      <span>드라이버</span>
      <button class="toggle" onclick="toggleItem('driver')" id="driver">
        <span></span>
      </button>
    </div>

    <div class="row">
      <span>아이언</span>
      <button class="toggle" onclick="toggleItem('iron')" id="iron">
        <span></span>
      </button>
    </div>

    <div class="row">
      <span>퍼팅</span>
      <button class="toggle" onclick="toggleItem('putting')" id="putting">
        <span></span>
      </button>
    </div>
  </div>

  <div class="result" id="result"></div>

  <script>
    const state = {
      driver: false,
      iron: false,
      putting: false
    };

    function toggleItem(key) {
      const nextValue = !state[key];

      Object.keys(state).forEach(item => {
        state[item] = item === key ? nextValue : !nextValue;
      });

      render();
    }

    function render() {
      Object.keys(state).forEach(key => {
        document.getElementById(key).classList.toggle("on", state[key]);
      });

      document.getElementById("result").innerHTML =
        `드라이버 ${state.driver ? "잘됨" : "안됨"}<br>
         아이언 ${state.iron ? "잘됨" : "안됨"}<br>
         퍼팅 ${state.putting ? "잘됨" : "안됨"}`;
    }

    render();
  </script>
</body>
</html>
